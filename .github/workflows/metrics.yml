name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
  push:
    branches: ["main", "master"]

jobs:
  # Job 1: Metrics principal
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: psicosisdeangel
          template: classic
          base: header, metadata
          config_timezone: America/Bogota

          plugin_isocalendar: yes

          plugin_languages: yes
          plugin_languages_ignored: html, css, scss
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8

          plugin_habits: yes
          plugin_habits_facts: yes
          plugin_habits_charts: yes

          plugin_achievements: yes
          plugin_achievements_threshold: C
          plugin_achievements_secrets: yes
          plugin_achievements_display: detailed

          plugin_followup: yes
          plugin_followup_sections: repositories



  # Job 4: People (followers)
  github-metrics-people:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          filename: github-metrics-people.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: psicosisdeangel
          base: ""
          plugin_people: yes
          plugin_people_types: followers
          plugin_people_limit: 24
          plugin_people_size: 32

  # Job 5: Topics en modo iconos (SVG separado)
  github-metrics-topics-icons:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          filename: github-metrics-topics-icons.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: psicosisdeangel
          base: ""
          plugin_topics: yes
          plugin_topics_mode: icons
          plugin_topics_sort: stars
          plugin_topics_limit: 0
# Job 7: AniList 
  github-metrics-manga:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          filename: github-metrics-manga.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: psicosisdeangel
          base: ""
          plugin_anilist: yes
          plugin_anilist_user: psicosisdeangel
          plugin_anilist_medias: manga
          plugin_anilist_sections: favorites, reading
          plugin_anilist_limit: 2
          plugin_anilist_shuffle: yes
# Job 8: Personajes favoritos
  github-metrics-characters:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          filename: github-metrics-characters.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: psicosisdeangel
          base: ""
          plugin_anilist: yes
          plugin_anilist_user: psicosisdeangel
          plugin_anilist_sections: characters
          plugin_anilist_limit_characters: 22
          plugin_anilist_shuffle: yes
# Job 9: letcode
  github-metrics-leetcode:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          filename: github-metrics-leetcode.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: psicosisdeangel
          base: ""
          plugin_leetcode: yes
          plugin_leetcode_user: psicosisdeangel
          plugin_leetcode_sections: solved, skills, recent
          plugin_leetcode_limit_skills: 10
          plugin_leetcode_limit_recent: 4
