name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
  push:
    branches: ["main", "master"]

jobs:
  # Job 1: Metrics principal
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: psicosisdeangel
          template: classic
          base: header, metadata
          config_timezone: America/Bogota

          plugin_isocalendar: yes

          plugin_languages: yes
          plugin_languages_ignored: html, css, scss
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8

          plugin_habits: yes
          plugin_habits_facts: yes
          plugin_habits_charts: yes

          plugin_achievements: yes
          plugin_achievements_threshold: C
          plugin_achievements_secrets: yes
          plugin_achievements_display: detailed

          plugin_followup: yes
          plugin_followup_sections: repositories



  # Job 4: People (followers)
  github-metrics-people:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          filename: github-metrics-people.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: psicosisdeangel
          base: ""
          plugin_people: yes
          plugin_people_types: followers
          plugin_people_limit: 24
          plugin_people_size: 32

  # Job 5: Topics en modo iconos (SVG separado)
  github-metrics-topics-icons:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          filename: github-metrics-topics-icons.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: psicosisdeangel
          base: ""
          plugin_topics: yes
          plugin_topics_mode: icons
          plugin_topics_sort: stars
          plugin_topics_limit: 0

    # Job 6: Template Markdown (genera un .md, no un SVG)
  github-metrics-markdown:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          filename: metrics.markdown.full.md
          token: ${{ secrets.METRICS_TOKEN }}
          user: psicosisdeangel
          template: markdown
          markdown: https://raw.githubusercontent.com/lowlighter/metrics/master/source/templates/markdown/example.md
          config_output: markdown

          plugin_activity: yes
          plugin_activity_limit: 7
          plugin_activity_days: 0
          plugin_activity_filter: issue, pr, release, fork, review, ref/create

          plugin_topics: yes
          plugin_topics_limit: 24

          plugin_isocalendar: yes

          plugin_languages: yes

          plugin_rss: yes
          plugin_rss_source: https://news.ycombinator.com/rss
          plugin_rss_limit: 4
