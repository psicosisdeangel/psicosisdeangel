name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
  push:
    branches: ["main", "master"]

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: psicosisdeangel
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: America/Bogota

          plugin_isocalendar: yes

          plugin_languages: yes
          plugin_languages_ignored: html, css, scss
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8

          plugin_habits: yes
          plugin_habits_facts: yes
          plugin_habits_charts: yes

          plugin_achievements: yes
          plugin_achievements_threshold: C
          plugin_achievements_secrets: yes
          plugin_achievements_display: detailed

          plugin_followup: yes
          plugin_followup_sections: repositories

  github-metrics-topics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          filename: github-metrics-topics.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: psicosisdeangel
          base: ""
          plugin_topics: yes
          plugin_topics_mode: labels
          plugin_topics_sort: stars
          plugin_topics_limit: 15

  github-metrics-terminal:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          filename: github-metrics-terminal.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: psicosisdeangel
          template: terminal
          base: header, metadata
          config_timezone: America/Bogota

          plugin_languages: yes
          plugin_languages_ignored: html, css, scss
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 6

  github-metrics-people:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          filename: github-metrics-people.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: psicosisdeangel
          base: ""
          plugin_people: yes
          plugin_people_types: followers
          plugin_people_limit: 24
          plugin_people_size: 32
